<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game-Start</title>
    <link rel="stylesheet" href="./styles/style-main.cs">
</head>
<body>
    
    <div class="contain-all">
    
    <!-- Left Side, Personal information and Stats -->
    <div class="left-side">
        <div class="portrait"></div>
        <div class="info-block">
            <div class="date-time-block"></div>
            <div class="stats-block"></div>
            <div class="save-load-block">
                <div id="save-button"></div>
                <div id="load-button"></div>
            </div>
        </div>
    </div>

    <!-- Right side, context and player input -->
    <div class="right-side">
        <div class="context-box"></div>
        <div class="choice-box">
            <div class="top-choices">
                <div class="choice1"></div>
                <div class="choice2"></div>
                <div class="choice3"></div>
                <div class="choice4"></div>
            </div>
            <div class="bottom-choices">
                <div class="choice5"></div>
                <div class="choice6"></div>
                <div class="choice7"></div>
                <div class="choice8"></div>
            </div>
        </div>
    </div>
    </div>
    
</body>
</html>

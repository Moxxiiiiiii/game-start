<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game-Start</title>
    <link rel="stylesheet" href="./styles/style-main.css">
</head>
<body>
    
    <div class="contain-all">
    
    <!-- Left Side, Personal information and Stats -->
    <div class="left-side">
        <div class="portrait"></div>
        <div class="info-block">
            <div class="date-time-block">
                <div id="date">Date</div>
                <div id="time">Time</div>
            </div>
            <div class="stats-block">
                <p class="stats" id="xp">Experience</p>
                <p class="stats" id="shield">Shields</p>
                <p class="stats" id="hp">Health</p>
                <p class="stats" id="lust">Lust</p>
            </div>
            <div class="save-load-block">
                <div id="save-button">Save</div>
                <div id="load-button">Load</div>
            </div>
        </div>
    </div>

    <!-- Right side, context and player input -->
    <div class="right-side">
        <div class="context-box">
            <div class="context-box-active">
                <p id="context-box-text">
                    Welcome to Tarin! <br><br>
                    Tarin is a world set far further into the future than our own. It's a world filled
                    with excitement, danger, love, lust and more! To begin your journey, all you need to
                    do is use the menu below.
                </p>
            </div>
        </div>
        <div class="choice-box">
            <div class="top-choices">
                <div class="choice" id="choice1">New Game</div>
                <div class="choice" id="choice2">Load Game</div>
                <div class="choice" id="choice3"></div>
                <div class="choice" id="choice4"></div>
            </div>
            <div class="bottom-choices">
                <div class="choice" id="choice5"></div>
                <div class="choice" id="choice6"></div>
                <div class="choice" id="choice7"></div>
                <div class="choice" id="choice8"></div>
            </div>
        </div>
    </div>
    </div>
    <script src="src/new-game.js"></script>
</body>
</html>
